name: Build Firmware

on:
  push:
    branches:
      - master
      - release
  pull_request:
    branches:
      - master
      - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-tags: true
          submodules: recursive

      - name: Check if version tag already exists
        id: tagcheck
        run: |
          VERSION=$(grep -oP '(?<=custom_version = ).*' Firmware/platformio.ini | tr -d '[:space:]')
          TAG="v${VERSION}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO packages
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('Firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO and Python dependencies
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio
          python -m pip install minify-html
          # If PlatformIO has its own venv on this runner, install there too.
          if [ -x "$HOME/.platformio/penv/bin/python" ]; then
            "$HOME/.platformio/penv/bin/python" -m pip install minify-html
          fi

      - name: Build release firmware
        if: steps.tagcheck.outputs.exists == 'false'
        working-directory: Firmware
        run: pio run -e release

      - name: Read version from platformio.ini
        if: steps.tagcheck.outputs.exists == 'false' && github.event_name == 'push'
        id: version
        run: |
          VERSION=$(grep -oP '(?<=custom_version = ).*' Firmware/platformio.ini | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if echo "$VERSION" | grep -qi '\-RC'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tagcheck.outputs.exists == 'false' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: Firmware/.pio/build/release/firmware.bin
          fail_on_unmatched_files: true

      - name: Notify server to pull firmware
        if: steps.tagcheck.outputs.exists == 'false' && github.event_name == 'push' && steps.version.outputs.prerelease == 'false'
        run: |
          curl -fsS \
            -X POST \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            https://otthing.seegel-systeme.de/update_firmware.php
